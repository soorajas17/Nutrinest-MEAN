<app-admin-header></app-admin-header>

<div class="container-fluid p-0" style="overflow-x:hidden;">
    <div class="row">
        <div class="col-md-2">
            <app-admin-sidebar></app-admin-sidebar>
        </div>
        <div class="col-md-10 ps-0">
            <div class="row bg-warning p-3">
                <h3><i class="fa-solid fa-bars"></i>Dashboard</h3>
            </div>
            <div class="row">
                <div class="col-md-3 p-4">
                    <div class="bg-info py-4 px-3 rounded text-light">
                        <h4><i class="fa-solid fa-user me-4"></i>Users {{allUsers}}+</h4>
                    </div>
                </div>
                <div class="col-md-3 p-4">
                    <div class="bg-danger py-4 px-3 rounded text-light">
                        <h4><i class="fa-solid fa-bowl-rice me-4"></i>Recipes {{allRecipes}}+</h4>
                    </div>
                </div>
                <div class="col-md-3 p-4">
                    <div class="bg-primary py-4 px-3 rounded text-light">
                        <h4><i class="fa-solid fa-download me-4"></i>Downloads {{allDownloads}}+</h4>
                    </div>
                </div>
                <div class="col-md-3 p-4">
                    <div class="bg-secondary py-4 px-3 rounded text-light">
                        <h4><i class="fa-solid fa-message me-4"></i>Notification {{allTestimonials}}+</h4>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
